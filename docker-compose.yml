version: "3.9"

services:
  # ========================
  # PostgreSQL
  # ========================
  db:
    image: postgres:15-alpine
    container_name: gaokao-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gaokao
      POSTGRES_PASSWORD: gaokao_secret
      POSTGRES_DB: gaokao
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaokao"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Redis
  # ========================
  redis:
    image: redis:7-alpine
    container_name: gaokao-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Backend (FastAPI)
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gaokao-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://gaokao:gaokao_secret@db:5432/gaokao
      REDIS_URL: redis://redis:6379/0
      DIFY_API_TOKEN: ${DIFY_API_TOKEN:-}
      DIFY_API_URL: ${DIFY_API_URL:-https://api.dify.ai/v1/workflows/run}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_URL: https://api.deepseek.com/v1/chat/completions
      DEEPSEEK_MODEL: deepseek-chat
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_URL: https://api.deepseek.com/v1/chat/completions
      LLM_MODEL: deepseek-v4-flash
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ========================
  # Daily Update Cron
  # ========================
  cron:
    build:
      context: ./backend
      dockerfile: Dockerfile.cron
    container_name: gaokao-cron
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./backend/data:/app/data
      - ./logs:/app/logs
    depends_on:
      - backend
      - redis

  # ========================
  # Frontend (Nginx static)
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gaokao-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
